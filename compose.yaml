name: advreajuste

services:
  app:
    build:
      context: .
    image: advreajuste-app:latest
    container_name: advreajuste
    hostname: advreajuste
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ADVREAJUSTE_DATA_DIR: /var/data
      ADVREAJUSTE_OCR_CACHE_DIR: /var/data/cache/ocr
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    volumes:
      - advreajuste_data:/var/data
    expose:
      - "8501"
    shm_size: "1gb"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8501/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  advreajuste_data:
    name: advreajuste_data
